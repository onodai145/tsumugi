name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies (Tauri v2 Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # dtolnay/rust-toolchain@stable is an intentionally moving branch that always
      # resolves the current stable Rust release, so it is left unpinned by design.
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: pnpm install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # cargo test は tauri::generate_context!() をコンパイル時に評価するため、
      # tauri.conf.json の frontendDist(../frontend/dist) が実在している必要がある。
      - name: pnpm build (frontendDist生成)
        working-directory: frontend
        run: pnpm build

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: pnpm install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: svelte-check
        working-directory: frontend
        run: pnpm check
